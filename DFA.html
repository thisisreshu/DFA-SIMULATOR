<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple DFA Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>DFA Simulator</h1>

    <div class="container">
        <div class="panel setup-panel">
            <h2>1. Define Automaton</h2>

            <div class="field">
                <label>Number of States:</label>
                <input type="number" id="num-states" value="3" min="1">
                <small>States are named q0, q1, ...</small>
            </div>

            <div class="transitions-section">
                <h3>Transitions</h3>
                <div class="transition-headers">
                    <span>Current State</span>
                    <span>Input</span>
                    <span>Final State</span>
                    <span></span>
                </div>
                <div id="transitions-container"></div>
                <button id="add-transition-btn" class="btn secondary">Add Transition</button>
            </div>

            <div class="field" style="margin-top: 15px;">
                <label>Initial State (First Input):</label>
                <input type="text" id="start-state" value="q0">
            </div>

            <div class="field">
                <label>Final States (Comma separated):</label>
                <input type="text" id="final-states" value="q2">
            </div>

            <button id="build-dfa-btn" class="btn primary build-btn">Build Automaton</button>
        </div>

        <div class="panel simulation-panel">
            <h2>2. Test Automaton</h2>
            <div class="field inline-field">
                <label>Input String:</label>
                <input type="text" id="test-string" placeholder="e.g. abaab">
                <button id="run-btn" class="btn primary">Simulate</button>
            </div>

            <div id="result-display" class="result"></div>

            <div id="tape-container" class="tape"></div>

            <div id="canvas-container">
                <svg id="edges-svg"></svg>
                <div id="nodes-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
